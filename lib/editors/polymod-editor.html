<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymod Editor para V-Slice</title>
    <link rel="icon" href="../images/icon.png">
    <link rel="stylesheet" href="../scripts/style.css">
</head>
<body>
    <img src="../images/polymod-editor-image.svg" alt="Título da imagem do Editor." class="image-editor-SVG">
    <img src="../images/version.png" alt="Imagem da versão" class="image-version">
    <div class="AlertMobile">
        <h1>Se essa mensagem está aparecendo, baixe a versão pra computador em:</h1>
        <a href="https://github.com/Cvncfs-2/Cvncfs-Engine-Webkit-Tools/releases">Releases no GitHub</a>
    </div>
    <p><strong>Título:</strong></p>
    <input type="text" id="title" placeholder="Ex.: Dragões">
    <p>Descrição:</p>
    <input type="text" id="description" placeholder="Um mod com tema de terror.">
    <p>Homepage (Adicione se quiser):</p>
    <input type="text" id="homepage" placeholder="https://example.com">
    <p>Autor:</p><input type="text" id="author" placeholder="Ex.: Você">
    <p>Versão da API:</p><input type="text" id="apiVersion" value="0.8.4">
    <p>Versão do Mod:</p><input type="text" id="modVersion" value="1.0.0">
    <p>Licença:</p>
    <select id="license">
        <option value="Proprietary">Proprietário</option>
        <option value="CC BY 4.0">Atribuição Internacional 4.0 da Creative Commons</option>
        <option value="CC0-1.0">Creative Commons Zero (Domínio Público).</option>
        <option value="MIT">MIT</option>
        <option value="Apache-2.0">Apache 2.0</option>
    </select><br><br><br>
    <button onclick="Baixar()">BAIXAR ARQUIVO</button>
    <script src="../scripts/script-polymodeditor.js"></script>
</body>
</html>
